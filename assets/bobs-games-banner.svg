    <tspan x="400" dy="12"> ████ ████ ████ ████    ████ ████ ████ ████████████████</tspan>
    <tspan x="400" dy="12"> ████ ████ ████ ████    ████ ████ ████ ████████████████</tspan>
    <tspan x="400" dy="12">  ▀▀▀  ▀▀▀  ▀▀▀  ▀▀▀▀     ▀▀▀  ▀▀▀  ▀▀▀     ▀▀▀▀▀▀▀▀▀▀▀▀▀▀</tspan>
  </text>
  
  <!-- Status -->
  <text x="400" y="170" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="12">
    BOOT VERIFIED · AGENT ONLINE · PRESS START
  </text>
  
