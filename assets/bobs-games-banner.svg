  <!-- Border -->
  <rect x="2" y="2" width="796" height="196" fill="none" stroke="#b8860b" stroke-width="2" opacity="0.5"/>
  
  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" fill="#ffd700" font-family="monospace" font-size="36" font-weight="bold" class="glow">
    BOB'S GAMES
  </text>
  
  <!-- Subtitle -->
