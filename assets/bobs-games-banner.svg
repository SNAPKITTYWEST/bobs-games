<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      @keyframes glow {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes scanline {
        0% { transform: translateY(0); }
        100% { transform: translateY(4px); }
      }
      @keyframes textFlicker {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
      }
      .glow { animation: glow 2s ease-in-out infinite; }
      .flicker { animation: textFlicker 0.1s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="#040406"/>
  
  <!-- Scanlines -->
  <g opacity="0.15">
    <rect x="0" y="0" width="800" height="2" fill="#000"/>
