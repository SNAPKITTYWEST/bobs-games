  <rect x="10" y="10" width="20" height="2" fill="#ffd700" opacity="0.5"/>
  <rect x="10" y="10" width="2" height="20" fill="#ffd700" opacity="0.5"/>
  <rect x="770" y="10" width="20" height="2" fill="#ffd700" opacity="0.5"/>
