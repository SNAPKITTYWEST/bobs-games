<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      @keyframes bobWalk {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(2px) translateY(-1px); }
        50% { transform: translateX(4px); }
        75% { transform: translateX(2px) translateY(1px); }
      }
      @keyframes antennaGlow {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      @keyframes starTwinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      @keyframes goldPulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes waterWave {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(3px); }
      }
      @keyframes lavaGlow {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      @keyframes wormScroll {
        0% { transform: translateX(100%); }
        100% { transform: translateX(-100%); }
      }
      .bob { animation: bobWalk 1s ease-in-out infinite; }
      .antenna { animation: antennaGlow 1.5s ease-in-out infinite; }
      .star { animation: starTwinkle 2s ease-in-out infinite; }
      .gold { animation: goldPulse 1.2s ease-in-out infinite; }
      .water { animation: waterWave 2s ease-in-out infinite; }
      .lava { animation: lavaGlow 0.8s ease-in-out infinite; }
      .worm-text { animation: wormScroll 15s linear infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#0a0a1a"/>
  
  <!-- Stars -->
  <g class="star" style="animation-delay: 0s">
    <rect x="50" y="30" width="2" height="2" fill="#ffd700" opacity="0.6"/>
    <rect x="150" y="60" width="1" height="1" fill="#ffffff" opacity="0.4"/>
    <rect x="250" y="20" width="2" height="2" fill="#ffd700" opacity="0.5"/>
    <rect x="350" y="45" width="1" height="1" fill="#ffffff" opacity="0.6"/>
    <rect x="450" y="25" width="2" height="2" fill="#ffd700" opacity="0.4"/>
    <rect x="550" y="55" width="1" height="1" fill="#ffffff" opacity="0.5"/>
    <rect x="650" y="35" width="2" height="2" fill="#ffd700" opacity="0.6"/>
    <rect x="750" y="50" width="1" height="1" fill="#ffffff" opacity="0.4"/>
  </g>
  <g class="star" style="animation-delay: 0.5s">
    <rect x="100" y="70" width="1" height="1" fill="#ffffff" opacity="0.5"/>
    <rect x="200" y="40" width="2" height="2" fill="#ffd700" opacity="0.4"/>
    <rect x="300" y="65" width="1" height="1" fill="#ffffff" opacity="0.6"/>
    <rect x="400" y="35" width="2" height="2" fill="#ffd700" opacity="0.5"/>
    <rect x="500" y="75" width="1" height="1" fill="#ffffff" opacity="0.4"/>
    <rect x="600" y="45" width="2" height="2" fill="#ffd700" opacity="0.6"/>
    <rect x="700" y="60" width="1" height="1" fill="#ffffff" opacity="0.5"/>
  </g>
  
  <!-- Moon -->
  <circle cx="700" cy="80" r="30" fill="#ffd700" opacity="0.3"/>
  <circle cx="710" cy="75" r="25" fill="#0a0a1a"/>
  
  <!-- Ground -->
  <rect x="0" y="280" width="800" height="120" fill="#2a1a0a"/>
  
  <!-- Grass layer -->
  <rect x="0" y="270" width="800" height="15" fill="#228b22"/>
  
  <!-- Path -->
  <rect x="0" y="285" width="800" height="10" fill="#d2b48c"/>
  
  <!-- Buildings -->
  <!-- Building 1 -->
  <rect x="50" y="180" width="80" height="90" fill="#4a4a5a"/>
  <rect x="50" y="170" width="80" height="15" fill="#8b0000"/>
  <rect x="60" y="200" width="15" height="15" fill="#87ceeb" opacity="0.7"/>
  <rect x="85" y="200" width="15" height="15" fill="#87ceeb" opacity="0.5"/>
  <rect x="110" y="200" width="15" height="15" fill="#87ceeb" opacity="0.7"/>
  <rect x="60" y="230" width="15" height="15" fill="#87ceeb" opacity="0.5"/>
  <rect x="85" y="230" width="15" height="15" fill="#87ceeb" opacity="0.7"/>
  <rect x="110" y="230" width="15" height="15" fill="#87ceeb" opacity="0.5"/>
  
  <!-- Building 2 -->
  <rect x="200" y="150" width="100" height="120" fill="#4a4a5a"/>
  <rect x="200" y="140" width="100" height="15" fill="#8b0000"/>
  <rect x="215" y="170" width="15" height="15" fill="#87ceeb" opacity="0.7"/>
  <rect x="240" y="170" width="15" height="15" fill="#87ceeb" opacity="0.5"/>
  <rect x="265" y="170" width="15" height="15" fill="#87ceeb" opacity="0.7"/>
  <rect x="215" y="200" width="15" height="15" fill="#87ceeb" opacity="0.5"/>
  <rect x="240" y="200" width="15" height="15" fill="#87ceeb" opacity="0.7"/>
  <rect x="265" y="200" width="15" height="15" fill="#87ceeb" opacity="0.5"/>
  <rect x="215" y="230" width="15" height="15" fill="#87ceeb" opacity="0.7"/>
  <rect x="240" y="230" width="15" height="15" fill="#87ceeb" opacity="0.5"/>
  <rect x="265" y="230" width="15" height="15" fill="#87ceeb" opacity="0.7"/>
  
  <!-- Building 3 -->
  <rect x="550" y="190" width="90" height="80" fill="#4a4a5a"/>
  <rect x="550" y="180" width="90" height="15" fill="#8b0000"/>
  <rect x="565" y="210" width="15" height="15" fill="#87ceeb" opacity="0.7"/>
  <rect x="590" y="210" width="15" height="15" fill="#87ceeb" opacity="0.5"/>
  <rect x="615" y="210" width="15" height="15" fill="#87ceeb" opacity="0.7"/>
  <rect x="565" y="240" width="15" height="15" fill="#87ceeb" opacity="0.5"/>
  <rect x="590" y="240" width="15" height="15" fill="#87ceeb" opacity="0.7"/>
  <rect x="615" y="240" width="15" height="15" fill="#87ceeb" opacity="0.5"/>
  
  <!-- Trees -->
  <g>
    <rect x="370" y="240" width="8" height="30" fill="#8b4513"/>
    <rect x="355" y="220" width="38" height="25" fill="#006400"/>
    <rect x="360" y="210" width="28" height="15" fill="#006400"/>
  </g>
  <g>
    <rect x="450" y="245" width="6" height="25" fill="#8b4513"/>
    <rect x="438" y="228" width="30" height="20" fill="#006400"/>
    <rect x="442" y="220" width="22" height="12" fill="#006400"/>
  </g>
  <g>
    <rect x="680" y="242" width="7" height="28" fill="#8b4513"/>
    <rect x="668" y="225" width="32" height="20" fill="#006400"/>
    <rect x="672" y="217" width="24" height="12" fill="#006400"/>
  </g>
  
  <!-- Gold veins -->
  <g class="gold">
    <rect x="160" y="260" width="8" height="8" fill="#ffd700"/>
    <rect x="175" y="255" width="6" height="6" fill="#ffd700"/>
    <rect x="185" y="262" width="5" height="5" fill="#ffd700"/>
  </g>
  <g class="gold" style="animation-delay: 0.3s">
    <rect x="480" y="258" width="7" height="7" fill="#ffd700"/>
    <rect x="495" y="253" width="5" height="5" fill="#ffd700"/>
    <rect x="505" y="260" width="6" height="6" fill="#ffd700"/>
  </g>
  
  <!-- Water -->
  <g class="water">
    <rect x="320" y="275" width="40" height="8" fill="#1e90ff" opacity="0.6"/>
  </g>
  <g class="water" style="animation-delay: 0.5s">
    <rect x="630" y="275" width="35" height="8" fill="#1e90ff" opacity="0.5"/>
  </g>
  
  <!-- Lava -->
  <g class="lava">
    <rect x="730" y="278" width="50" height="6" fill="#ff4500"/>
  </g>
  
  <!-- Bob Robot -->
  <g class="bob" transform="translate(400, 240)">
    <!-- Legs -->
    <rect x="-4" y="28" width="6" height="10" fill="#606060"/>
    <rect x="6" y="28" width="6" height="10" fill="#606060"/>
    
    <!-- Body -->
    <rect x="-8" y="12" width="22" height="18" fill="#c0c0c0"/>
    
    <!-- Arms -->
    <rect x="-14" y="16" width="8" height="4" fill="#808080"/>
    <rect x="16" y="16" width="8" height="4" fill="#808080"/>
    
    <!-- Head -->
    <rect x="-6" y="0" width="18" height="14" fill="#a0a0a0"/>
    
    <!-- Eyes -->
    <rect x="-2" y="4" width="3" height="3" fill="#00ff88"/>
    <rect x="6" y="4" width="3" height="3" fill="#00ff88"/>
    
    <!-- Antenna -->
    <rect x="4" y="-8" width="3" height="10" fill="#ffd700"/>
    <circle cx="5.5" cy="-10" r="3" fill="#ffd700" class="antenna"/>
  </g>
  
  <!-- WORM Chain -->
  <rect x="0" y="390" width="800" height="10" fill="#000000"/>
  <text x="0" y="398" fill="#b8860b" font-family="monospace" font-size="8" class="worm-text">
    WORM: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855 · SNAPKITTYWEST · BOB'S GAMES · EVIDENCE OR SILENCE · 
  </text>
  
  <!-- HUD -->
  <rect x="10" y="10" width="180" height="60" fill="rgba(0,0,0,0.7)" stroke="#ffd700" stroke-width="1"/>
  <text x="20" y="30" fill="#ffd700" font-family="monospace" font-size="12" font-weight="bold">BOB CIVILIZATION</text>
  <text x="20" y="48" fill="#00ff88" font-family="monospace" font-size="10">POS: 20,14</text>
  <text x="20" y="62" fill="#00ff88" font-family="monospace" font-size="10">GOLD: 042</text>
</svg>
