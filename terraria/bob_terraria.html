<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BOB TERRARIA — Sovereign 2D World</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#040406; color:#ffd700; font-family:'Courier New',monospace; overflow:hidden; }
#hud { position:fixed; top:0; left:0; right:0; padding:6px 12px; background:rgba(0,0,0,.85); display:flex; gap:24px; align-items:center; z-index:10; font-size:11px; border-bottom:1px solid #1c1c24; }
#hud .title { color:#ffd700; font-weight:bold; letter-spacing:.1em; }
#hud .stat  { color:#505060; }
#hud .val   { color:#00ff88; }
canvas { display:block; }
#worm { position:fixed; bottom:0; left:0; right:0; padding:4px 12px; background:rgba(0,0,0,.9); font-size:9px; color:#b8860b; opacity:.5; border-top:1px solid #1c1c24; }
</style>
</head>
<body>
<div id="hud">
  <span class="title">BOB TERRARIA</span>
  <span class="stat">HP: <span class="val" id="hp">100</span></span>
  <span class="stat">DEPTH: <span class="val" id="depth">0</span>m</span>
  <span class="stat">ORE: <span class="val" id="ore">0</span></span>
  <span class="stat">CHUNK: <span class="val" id="chunk">CODE_ORACLE</span></span>
  <span class="stat">WORM: <span class="val" id="wseal" style="color:#b8860b">...</span></span>
</div>
<canvas id="c"></canvas>
<div id="worm">WORM CHAIN: initializing...</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = Math.max(240, window.innerHeight - 32);

// ── World gen ────────────────────────────────────────────────
const CZ  = 16;   // chunk size
const WW  = 128;  // world width (tiles)
const WH  = 96;   // world height (tiles)

// Tile types
const T = { AIR:0, DIRT:1, STONE:2, GRASS:3, GOLD_ORE:4, IRON_ORE:5,
            COAL:6, WATER:7, LAVA:8, WOOD:9, BEDROCK:10, CHEST:11 };

const TILE_COLORS = {
  [T.AIR]:null, [T.DIRT]:'#6b4226', [T.STONE]:'#555570',
  [T.GRASS]:'#2d8a2d', [T.GOLD_ORE]:'#ffd700', [T.IRON_ORE]:'#c0a060',
  [T.COAL]:'#222228', [T.WATER]:'#1a6eff', [T.LAVA]:'#ff4400',
  [T.WOOD]:'#7a5230', [T.BEDROCK]:'#111118', [T.CHEST]:'#b8860b'
};

const TILE_NAMES = {
  [T.DIRT]:'DIRT',[T.STONE]:'STONE',[T.GRASS]:'GRASS',
  [T.GOLD_ORE]:'GOLD ORE',[T.IRON_ORE]:'IRON ORE',
  [T.COAL]:'COAL',[T.WATER]:'WATER',[T.LAVA]:'LAVA',
  [T.WOOD]:'WOOD',[T.BEDROCK]:'BEDROCK',[T.CHEST]:'CHEST'
};

// Generate world
const world = new Uint8Array(WW * WH);
function wIdx(x,y) { return y*WW+x; }

function generateWorld() {
  // Surface terrain with sine-wave + noise
  const surface = new Int32Array(WW);
  for (let x=0;x<WW;x++) {
    surface[x] = Math.floor(20 + 6*Math.sin(x*0.08) + 4*Math.sin(x*0.19+1.3) + 2*Math.sin(x*0.41+2.1));
  }

  for (let y=0;y<WH;y++) {
    for (let x=0;x<WW;x++) {
      const surf = surface[x];
      if (y < surf) {
        world[wIdx(x,y)] = T.AIR;
      } else if (y === surf) {
        world[wIdx(x,y)] = T.GRASS;
      } else if (y < surf+4) {
        world[wIdx(x,y)] = T.DIRT;
      } else if (y >= WH-3) {
        world[wIdx(x,y)] = T.BEDROCK;
      } else {
        world[wIdx(x,y)] = T.STONE;
      }
    }
  }

  // Ore veins
  function placeOre(type, count, minY, maxY) {
    for (let i=0;i<count;i++) {
      const vx = Math.floor(Math.random()*WW);
      const vy = minY + Math.floor(Math.random()*(maxY-minY));
      const size = 3 + Math.floor(Math.random()*5);
      for (let j=0;j<size;j++) {
        const ox = vx + Math.floor(Math.random()*3)-1;
        const oy = vy + Math.floor(Math.random()*3)-1;
        if (ox>=0&&ox<WW&&oy>=0&&oy<WH && world[wIdx(ox,oy)]===T.STONE)
          world[wIdx(ox,oy)] = type;
      }
    }
  }
  placeOre(T.COAL,     40, 30, WH-10);
  placeOre(T.IRON_ORE, 25, 35, WH-8);
  placeOre(T.GOLD_ORE, 12, 45, WH-5);

  // Caves
  for (let i=0;i<30;i++) {
    let cx = Math.floor(Math.random()*WW);
    let cy = 35+Math.floor(Math.random()*(WH-45));
    let cdx = Math.random()-0.5, cdy = Math.random()-0.5;
    for (let s=0;s<40;s++) {
      if (cx>=1&&cx<WW-1&&cy>=1&&cy<WH-1) world[wIdx(Math.round(cx),Math.round(cy))]=T.AIR;
      cx+=cdx+Math.random()*0.4-0.2; cy+=cdy+Math.random()*0.4-0.2;
      cdx*=0.9; cdy*=0.9;
    }
  }

  // Chests
  for (let i=0;i<8;i++) {
    const cx=1+Math.floor(Math.random()*(WW-2));
    const cy=25+Math.floor(Math.random()*(WH-35));
    if (world[wIdx(cx,cy)]===T.STONE) world[wIdx(cx,cy)]=T.CHEST;
  }

  // Trees on surface
  for (let x=2;x<WW-2;x++) {
    if (world[wIdx(x,surface[x])]===T.GRASS && Math.random()<0.12) {
      const h = 3+Math.floor(Math.random()*3);
      for (let ty=1;ty<=h;ty++) {
        if (surface[x]-ty>=0) world[wIdx(x,surface[x]-ty)]=T.WOOD;
      }
    }
  }
}
generateWorld();

// ── Player ──────────────────────────────────────────────────
const player = {
  x: WW/2*CZ, y: 18*CZ, vx:0, vy:0,
  w:12, h:20, onGround:false, hp:100, ore:0,
  selectedTile: T.DIRT
};

// ── Camera ──────────────────────────────────────────────────
const cam = { x:0, y:0 };

// ── Input ───────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e=>{ keys[e.code]=true; e.preventDefault(); });
document.addEventListener('keyup',   e=>{ keys[e.code]=false; });

// ── Mine/place on click ──────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  const wx = Math.floor((e.clientX + cam.x) / CZ);
  const wy = Math.floor((e.clientY - 32 + cam.y) / CZ);
  if (wx<0||wx>=WW||wy<0||wy>=WH) return;
  if (e.button===0) {
    const t = world[wIdx(wx,wy)];
    if (t!==T.AIR&&t!==T.BEDROCK) {
      if (t===T.GOLD_ORE||t===T.IRON_ORE||t===T.COAL) player.ore++;
      world[wIdx(wx,wy)] = T.AIR;
      sealEvent(`MINE|${TILE_NAMES[t]||t}`);
    }
  } else if (e.button===2) {
    if (world[wIdx(wx,wy)]===T.AIR)
      world[wIdx(wx,wy)] = player.selectedTile;
  }
});
canvas.addEventListener('contextmenu', e=>e.preventDefault());

// ── WORM seal ────────────────────────────────────────────────
let wormPrev = 'GENESIS';
function fallbackDigestHex(input) {
  let h1 = 0x811c9dc5, h2 = 0x01000193;
  for (let i=0;i<input.length;i++) {
    h1 ^= input.charCodeAt(i);
    h1 = Math.imul(h1, 0x01000193) >>> 0;
    h2 ^= h1 + i;
    h2 = Math.imul(h2, 0x85ebca6b) >>> 0;
  }
  return Array.from({length:8},(_,i)=>((i%2?h2:h1) ^ Math.imul(i+1,0x9e3779b1)).toString(16).padStart(8,'0')).join('');
}
async function sealEvent(evt) {
  const msg = `${wormPrev}|${evt}`;
  if (window.crypto && crypto.subtle) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    wormPrev = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  } else {
    wormPrev = fallbackDigestHex(msg);
  }
  document.getElementById('wseal').textContent = wormPrev.slice(0,16)+'...';
  document.getElementById('worm').textContent  = 'WORM CHAIN: '+wormPrev;
}
sealEvent('WORLD_GEN');

// ── Physics ──────────────────────────────────────────────────
function tileAt(px,py) {
  const tx=Math.floor(px/CZ), ty=Math.floor(py/CZ);
  if (tx<0||tx>=WW||ty<0||ty>=WH) return T.STONE;
  return world[wIdx(tx,ty)];
}
function solid(t) { return t!==T.AIR&&t!==T.WATER; }

function physics() {
  const spd = keys['ShiftLeft']?5:3;
  if ((keys['ArrowLeft']||keys['KeyA'])&&!solid(tileAt(player.x-1, player.y+player.h/2)))
    player.vx = -spd;
  else if ((keys['ArrowRight']||keys['KeyD'])&&!solid(tileAt(player.x+player.w+1, player.y+player.h/2)))
    player.vx = spd;
  else player.vx *= 0.7;

  if ((keys['ArrowUp']||keys['KeyW']||keys['Space'])&&player.onGround) {
    player.vy = -10; player.onGround=false;
    sealEvent('JUMP');
  }

  player.vy = Math.min(player.vy+0.45, 18);
  player.x += player.vx;
  player.y += player.vy;

  // collision Y
  player.onGround=false;
  if (player.vy>0) {
    const foot = player.y+player.h;
    if (solid(tileAt(player.x+player.w*0.3,foot))||solid(tileAt(player.x+player.w*0.7,foot))) {
      player.y = Math.floor(foot/CZ)*CZ-player.h;
      player.vy=0; player.onGround=true;
    }
  } else if (player.vy<0) {
    if (solid(tileAt(player.x+player.w*0.5,player.y))) {
      player.y = Math.ceil(player.y/CZ)*CZ;
      player.vy=0;
    }
  }
  // collision X
  if (player.vx>0&&solid(tileAt(player.x+player.w,player.y+2)))
    { player.x=Math.floor((player.x+player.w)/CZ)*CZ-player.w; player.vx=0; }
  if (player.vx<0&&solid(tileAt(player.x-1,player.y+2)))
    { player.x=Math.ceil(player.x/CZ)*CZ; player.vx=0; }

  // world bounds
  player.x=Math.max(0,Math.min(player.x,(WW-1)*CZ));
  player.y=Math.max(0,Math.min(player.y,(WH-2)*CZ));

  // lava damage
  if (tileAt(player.x+player.w/2,player.y+player.h/2)===T.LAVA) player.hp=Math.max(0,player.hp-0.1);
}

// ── Render ───────────────────────────────────────────────────
function render() {
  // Camera follow
  cam.x = player.x - canvas.width/2;
  cam.y = player.y - canvas.height/2;
  cam.x = Math.max(0,Math.min(cam.x,(WW*CZ)-canvas.width));
  cam.y = Math.max(0,Math.min(cam.y,(WH*CZ)-canvas.height));

  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,canvas.height);
  sky.addColorStop(0,'#0a0a1a'); sky.addColorStop(1,'#1a1a2e');
  ctx.fillStyle=sky; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Stars
  ctx.fillStyle='rgba(255,255,255,0.4)';
  for (let i=0;i<50;i++) {
    const sx=(i*137+cam.x*0.02)%(canvas.width);
    const sy=(i*97+11)%160;
    ctx.fillRect(sx,sy,1,1);
  }

  // Tiles
  const tx0=Math.max(0,Math.floor(cam.x/CZ));
  const tx1=Math.min(WW,Math.ceil((cam.x+canvas.width)/CZ));
  const ty0=Math.max(0,Math.floor(cam.y/CZ));
  const ty1=Math.min(WH,Math.ceil((cam.y+canvas.height)/CZ));

  for (let ty=ty0;ty<ty1;ty++) {
    for (let tx=tx0;tx<tx1;tx++) {
      const t=world[wIdx(tx,ty)];
      if (t===T.AIR) continue;
      const col=TILE_COLORS[t];
      if (!col) continue;
      const px=tx*CZ-cam.x, py=ty*CZ-cam.y;
      ctx.fillStyle=col;
      ctx.fillRect(px,py,CZ-1,CZ-1);
      // ore sparkle
      if (t===T.GOLD_ORE) {
        ctx.fillStyle='rgba(255,255,200,0.6)';
        ctx.fillRect(px+4,py+4,4,4);
      }
      if (t===T.CHEST) {
        ctx.strokeStyle='#ffd700'; ctx.lineWidth=1;
        ctx.strokeRect(px+2,py+2,CZ-5,CZ-5);
      }
    }
  }

  // Player (pixel art style)
  const px=player.x-cam.x, py=player.y-cam.y;
  // body
  ctx.fillStyle='#ffd700'; ctx.fillRect(px+2,py,8,8);  // head gold
  ctx.fillStyle='#222';    ctx.fillRect(px+3,py+2,2,2); // left eye
  ctx.fillStyle='#222';    ctx.fillRect(px+7,py+2,2,2); // right eye
  ctx.fillStyle='#4488ff'; ctx.fillRect(px,py+8,12,8);  // body blue
  ctx.fillStyle='#b8860b'; ctx.fillRect(px+1,py+16,4,4); // left leg
  ctx.fillStyle='#b8860b'; ctx.fillRect(px+7,py+16,4,4); // right leg

  // HUD update
  const depth=Math.max(0,Math.floor((player.y/CZ)-22));
  document.getElementById('hp').textContent=Math.ceil(player.hp);
  document.getElementById('depth').textContent=depth;
  document.getElementById('ore').textContent=player.ore;
  document.getElementById('chunk').textContent=
    depth>40?'LAVA_CHUNK':depth>20?'STONE_CHUNK':depth>5?'DIRT_CHUNK':'SURFACE_CHUNK';

  // Minimap
  const mm=60, ms=2;
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(canvas.width-mm*ms-8,4,mm*ms+2,32*ms+2);
  for (let my=0;my<32;my++) {
    for (let mx=0;mx<mm;mx++) {
      const t=world[wIdx(Math.floor(mx*WW/mm), Math.floor(my*WH/32))];
      const col=TILE_COLORS[t];
      if (col) { ctx.fillStyle=col; ctx.fillRect(canvas.width-mm*ms-8+mx*ms,4+my*ms,ms,ms); }
    }
  }
  // player dot on minimap
  ctx.fillStyle='#fff';
  ctx.fillRect(canvas.width-mm*ms-8+Math.floor(player.x/CZ*mm/WW)*ms-1, 4+Math.floor(player.y/CZ*32/WH)*ms-1, 3, 3);
}

// ── Loop ─────────────────────────────────────────────────────
function loop() {
  physics();
  render();
  requestAnimationFrame(loop);
}
loop();

window.addEventListener('resize', ()=>{
  canvas.width=window.innerWidth;
  canvas.height=Math.max(240, window.innerHeight-32);
});
</script>
</body>
</html>
