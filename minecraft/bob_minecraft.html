<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BOB MINECRAFT — Sovereign Voxel World</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#040406; overflow:hidden; font-family:'Courier New',monospace; }
canvas { display:block; cursor:crosshair; }
#hud { position:fixed; top:0; left:0; right:0; padding:6px 14px; background:rgba(0,0,0,.88); display:flex; gap:20px; align-items:center; font-size:11px; color:#ffd700; border-bottom:1px solid #1c1c24; z-index:10; }
#hud span { color:#505060; }
#hud b    { color:#00ff88; }
#crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-size:20px; pointer-events:none; opacity:.8; }
#worm { position:fixed; bottom:0; left:0; right:0; padding:4px 14px; background:rgba(0,0,0,.9); font-size:9px; color:#b8860b; opacity:.45; border-top:1px solid #1c1c24; }
#toolbar { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); display:flex; gap:4px; background:rgba(0,0,0,.8); padding:6px; border:1px solid #1c1c24; border-radius:2px; }
.slot { width:36px; height:36px; border:1px solid #333; display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; }
.slot.active { border-color:#ffd700; }
</style>
</head>
<body>
<div id="hud">
  <span style="color:#ffd700;font-weight:bold;letter-spacing:.1em">BOB MINECRAFT</span>
  <span>POS: <b id="pos">0,0,0</b></span>
  <span>BLOCK: <b id="blk">AIR</b></span>
  <span>FPS: <b id="fps">0</b></span>
  <span>CHUNK: <b id="chunk">CODE_ORACLE</b></span>
  <span>WORM: <b id="wseal" style="color:#b8860b">...</b></span>
</div>
<div id="crosshair">+</div>
<canvas id="c"></canvas>
<div id="toolbar">
  <div class="slot active" title="GRASS">🟩</div>
  <div class="slot" title="DIRT">🟫</div>
  <div class="slot" title="STONE">⬜</div>
  <div class="slot" title="WOOD">🪵</div>
  <div class="slot" title="GOLD">🟡</div>
  <div class="slot" title="WATER">🟦</div>
  <div class="slot" title="LAVA">🟥</div>
  <div class="slot" title="GLASS">◻️</div>
</div>
<div id="worm">WORM CHAIN: initializing...</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0, half = 0, imgData, buf;
function resizeCanvas() {
  canvas.width  = Math.max(320, window.innerWidth);
  canvas.height = Math.max(240, window.innerHeight);
  W = canvas.width;
  H = canvas.height;
  half = Math.floor(H/2);
  imgData = ctx.createImageData(W,H);
  buf = imgData.data;
}
resizeCanvas();

// ── Raycaster Voxel Engine ────────────────────────────────────
const BLOCK = { AIR:0, GRASS:1, DIRT:2, STONE:3, WOOD:4, GOLD:5, WATER:6, LAVA:7, GLASS:8, BEDROCK:9 };
const BLOCK_COLORS = [
  null,
  ['#2d8a2d','#1a6e1a','#3da03d'],   // GRASS  top/shade/side
  ['#6b4226','#4a2f1a','#7a5230'],   // DIRT
  ['#555570','#333348','#666680'],   // STONE
  ['#7a5230','#5a3a20','#8a6240'],   // WOOD
  ['#ffd700','#b8860b','#ffe040'],   // GOLD
  ['#1a6eff88','#0040aa44','#4488ff66'],// WATER
  ['#ff4400','#cc2200','#ff6622'],   // LAVA
  ['#ffffffaa','#ccccccaa','#ddddddaa'],// GLASS
  ['#111118','#08080e','#1a1a22'],   // BEDROCK
];
const BLOCK_NAMES = ['AIR','GRASS','DIRT','STONE','WOOD','GOLD ORE','WATER','LAVA','GLASS','BEDROCK'];

// ── World ─────────────────────────────────────────────────────
const WX=64, WY=32, WZ=64;
const world = new Uint8Array(WX*WY*WZ);
function wi(x,y,z) {
  if (x<0||x>=WX||y<0||y>=WY||z<0||z>=WZ) return -1;
  return y*WX*WZ+z*WX+x;
}
function getB(x,y,z) { const i=wi(x,y,z); return i<0?BLOCK.BEDROCK:world[i]; }
function setB(x,y,z,b) { const i=wi(x,y,z); if(i>=0)world[i]=b; }

// Generate terrain
function genWorld() {
  for (let x=0;x<WX;x++) for (let z=0;z<WZ;z++) {
    const h = Math.floor(12 + 4*Math.sin(x*0.15)+3*Math.cos(z*0.12)+2*Math.sin((x+z)*0.08));
    for (let y=0;y<WY;y++) {
      if (y===0) setB(x,y,z,BLOCK.BEDROCK);
      else if (y<h-3) setB(x,y,z,BLOCK.STONE);
      else if (y<h)   setB(x,y,z,BLOCK.DIRT);
      else if (y===h) setB(x,y,z,BLOCK.GRASS);
      else            setB(x,y,z,BLOCK.AIR);
    }
  }
  // Ore deposits
  for (let i=0;i<80;i++) {
    const gx=Math.floor(Math.random()*WX);
    const gy=1+Math.floor(Math.random()*8);
    const gz=Math.floor(Math.random()*WZ);
    if (getB(gx,gy,gz)===BLOCK.STONE) setB(gx,gy,gz,BLOCK.GOLD);
  }
  // Trees
  for (let i=0;i<20;i++) {
    const tx=3+Math.floor(Math.random()*(WX-6));
    const tz=3+Math.floor(Math.random()*(WZ-6));
    // find surface
    for (let y=WY-1;y>0;y--) {
      if (getB(tx,y,tz)===BLOCK.GRASS) {
        for (let th=1;th<=4;th++) setB(tx,y+th,tz,BLOCK.WOOD);
        break;
      }
    }
  }
}
genWorld();

// ── Player ────────────────────────────────────────────────────
const player = {
  x:WX/2+0.5, y:20, z:WZ/2+0.5,
  pitch:0.15, yaw:Math.PI*1.5,
  vx:0, vy:0, vz:0,
  onGround:false,
  selectedBlock: BLOCK.GRASS
};

// ── Input ─────────────────────────────────────────────────────
const keys={};
let mouseX=0,mouseY=0,mouseDown=false,rightDown=false;
document.addEventListener('keydown',e=>{keys[e.code]=true;});
document.addEventListener('keyup',  e=>{keys[e.code]=false;});

// Pointer lock
canvas.addEventListener('click',()=>canvas.requestPointerLock());
document.addEventListener('pointerlockchange',()=>{});
document.addEventListener('mousemove',e=>{
  if (document.pointerLockElement===canvas) {
    player.yaw   += e.movementX*0.003;
    player.pitch  = Math.max(-1.4,Math.min(1.4,player.pitch+e.movementY*0.003));
  }
});
document.addEventListener('mousedown',e=>{
  if (e.button===0) mouseDown=true;
  if (e.button===2) rightDown=true;
});
document.addEventListener('mouseup',e=>{
  if (e.button===0) mouseDown=false;
  if (e.button===2) rightDown=false;
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// ── Raycast ───────────────────────────────────────────────────
function raycast(ox,oy,oz,dx,dy,dz,maxDist) {
  let x=Math.floor(ox),y=Math.floor(oy),z=Math.floor(oz);
  const sx=dx>0?1:-1,sy=dy>0?1:-1,sz=dz>0?1:-1;
  const tdx=Math.abs(1/dx),tdy=Math.abs(1/dy),tdz=Math.abs(1/dz);
  let tmx=(dx>0?(x+1-ox):(ox-x))*tdx;
  let tmy=(dy>0?(y+1-oy):(oy-y))*tdy;
  let tmz=(dz>0?(z+1-oz):(oz-z))*tdz;
  let face=0, dist=0;
  while (dist<maxDist) {
    const b=getB(x,y,z);
    if (b!==BLOCK.AIR&&b!==BLOCK.WATER) return {x,y,z,face,block:b};
    if (tmx<tmy&&tmx<tmz) { x+=sx; dist=tmx; tmx+=tdx; face=0; }
    else if (tmy<tmz)      { y+=sy; dist=tmy; tmy+=tdy; face=1; }
    else                   { z+=sz; dist=tmz; tmz+=tdz; face=2; }
  }
  return null;
}

// ── Renderer (column raycaster + floor/ceiling) ───────────────
function setPixel(x,y,r,g,b) {
  const i=(y*W+x)*4;
  buf[i]=r;buf[i+1]=g;buf[i+2]=b;buf[i+3]=255;
}

function render3D() {
  const cosY=Math.cos(player.yaw), sinY=Math.sin(player.yaw);
  const cosPitch=Math.cos(player.pitch), sinPitch=Math.sin(player.pitch);

  for (let col=0;col<W;col++) {
    const cameraX = (2*col/W - 1);
    const fov = 0.66;
    const rdx = cosY - cameraX*fov*sinY*(-1) + sinY*cosPitch;
    const rdz = sinY + cameraX*fov*cosY;
    const rdy = -sinPitch + cameraX*0.0;

    const hit = raycast(player.x,player.y,player.z,rdx,rdy,rdz,24);

    if (!hit) {
      // sky
      for (let row=0;row<H;row++) {
        const t=row/H;
        setPixel(col,row,Math.floor(4+6*t),Math.floor(4+8*t),Math.floor(8+20*t));
      }
      continue;
    }

    const dist=Math.max(0.1,
      Math.abs(hit.face===0?(hit.x+0.5-player.x)/rdx:
               hit.face===1?(hit.y+0.5-player.y)/rdy:
                            (hit.z+0.5-player.z)/rdz));
    const wallH=Math.min(H,Math.floor(H/dist));
    const wallTop=Math.max(0,Math.floor((H-wallH)/2));
    const wallBot=Math.min(H,wallTop+wallH);

    const cols=BLOCK_COLORS[hit.block]||['#888','#555','#aaa'];
    const c=cols[hit.face];
    const shade=hit.face===1?0.7:hit.face===2?0.85:1.0;
    let r=parseInt(c.slice(1,3),16)||128;
    let g=parseInt(c.slice(3,5),16)||128;
    let b2=parseInt(c.slice(5,7),16)||128;
    r=Math.floor(r*shade);g=Math.floor(g*shade);b2=Math.floor(b2*shade);

    // fog
    const fog=Math.min(1,dist/20);
    r=Math.floor(r*(1-fog)+4*fog);
    g=Math.floor(g*(1-fog)+4*fog);
    b2=Math.floor(b2*(1-fog)+6*fog);

    for (let row=0;row<H;row++) {
      if (row<wallTop) {
        // ceiling / sky
        const t=row/wallTop;
        setPixel(col,row,Math.floor(4+8*t),Math.floor(4+10*t),Math.floor(8+24*t));
      } else if (row<wallBot) {
        setPixel(col,row,r,g,b2);
      } else {
        // floor
        const t=(row-wallBot)/(H-wallBot);
        setPixel(col,row,Math.floor(30+20*t),Math.floor(20+15*t),Math.floor(10+8*t));
      }
    }
  }
  ctx.putImageData(imgData,0,0);
}

// ── Physics ───────────────────────────────────────────────────
const GRAVITY=0.04, JUMP=-0.35, SPEED=0.08;
let blockActionTimer=0;

function update() {
  const cosY=Math.cos(player.yaw), sinY=Math.sin(player.yaw);
  let mx=0,mz=0;
  if (keys['KeyW']||keys['ArrowUp'])    { mx+=cosY;mz+=sinY; }
  if (keys['KeyS']||keys['ArrowDown'])  { mx-=cosY;mz-=sinY; }
  if (keys['KeyA']||keys['ArrowLeft'])  { mx-=sinY;mz+=cosY; }
  if (keys['KeyD']||keys['ArrowRight']) { mx+=sinY;mz-=cosY; }
  const len=Math.sqrt(mx*mx+mz*mz)||1;
  player.vx=mx/len*SPEED; player.vz=mz/len*SPEED;
  if (keys['Space']&&player.onGround) { player.vy=JUMP; player.onGround=false; }
  player.vy+=GRAVITY;

  const nx=player.x+player.vx;
  if (getB(Math.floor(nx),Math.floor(player.y),Math.floor(player.z))===BLOCK.AIR) player.x=nx;
  const nz=player.z+player.vz;
  if (getB(Math.floor(player.x),Math.floor(player.y),Math.floor(nz))===BLOCK.AIR) player.z=nz;
  const ny=player.y+player.vy;
  if (getB(Math.floor(player.x),Math.floor(ny),Math.floor(player.z))!==BLOCK.AIR) {
    if (player.vy>0) player.onGround=true;
    player.vy=0;
  } else {
    player.y=ny; player.onGround=false;
  }
  player.x=Math.max(0.5,Math.min(WX-0.5,player.x));
  player.y=Math.max(1,Math.min(WY-1,player.y));
  player.z=Math.max(0.5,Math.min(WZ-0.5,player.z));

  // block interaction
  blockActionTimer++;
  if (blockActionTimer>6) {
    const cosY2=Math.cos(player.yaw),sinY2=Math.sin(player.yaw);
    const cosPitch2=Math.cos(player.pitch),sinPitch2=Math.sin(player.pitch);
    const hit=raycast(player.x,player.y,player.z,
                      cosY2*cosPitch2,-sinPitch2,sinY2*cosPitch2,6);
    if (hit) {
      document.getElementById('blk').textContent=BLOCK_NAMES[hit.block]||'?';
      if (mouseDown)  { setB(hit.x,hit.y,hit.z,BLOCK.AIR); sealEvent(`BREAK|${BLOCK_NAMES[hit.block]}`); blockActionTimer=0; }
      if (rightDown) {
        const nx2=hit.x+(hit.face===0?-1:0), ny2=hit.y+(hit.face===1?-1:0), nz2=hit.z+(hit.face===2?-1:0);
        setB(nx2,ny2,nz2,player.selectedBlock);
        sealEvent(`PLACE|${BLOCK_NAMES[player.selectedBlock]}`);
        blockActionTimer=0;
      }
    } else {
      document.getElementById('blk').textContent='AIR';
    }
  }

  document.getElementById('pos').textContent=
    `${Math.floor(player.x)},${Math.floor(player.y)},${Math.floor(player.z)}`;
  const depth=Math.max(0,20-Math.floor(player.y));
  document.getElementById('chunk').textContent=
    depth>15?'BEDROCK_CHUNK':depth>8?'STONE_CHUNK':depth>3?'DIRT_CHUNK':'SURFACE_CHUNK';
}

// toolbar
document.querySelectorAll('.slot').forEach((s,i)=>{
  s.addEventListener('click',()=>{
    document.querySelectorAll('.slot').forEach(x=>x.classList.remove('active'));
    s.classList.add('active');
    player.selectedBlock=[BLOCK.GRASS,BLOCK.DIRT,BLOCK.STONE,BLOCK.WOOD,
                          BLOCK.GOLD,BLOCK.WATER,BLOCK.LAVA,BLOCK.GLASS][i];
  });
});

// WORM
let wormPrev='GENESIS';
function fallbackDigestHex(input) {
  let h1 = 0x811c9dc5, h2 = 0x01000193;
  for (let i=0;i<input.length;i++) {
    h1 ^= input.charCodeAt(i);
    h1 = Math.imul(h1, 0x01000193) >>> 0;
    h2 ^= h1 + i;
    h2 = Math.imul(h2, 0x85ebca6b) >>> 0;
  }
  return Array.from({length:8},(_,i)=>((i%2?h2:h1) ^ Math.imul(i+1,0x9e3779b1)).toString(16).padStart(8,'0')).join('');
}
async function sealEvent(evt) {
  const msg=`${wormPrev}|${evt}`;
  if (window.crypto && crypto.subtle) {
    const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
    wormPrev=Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
  } else {
    wormPrev=fallbackDigestHex(msg);
  }
  document.getElementById('wseal').textContent=wormPrev.slice(0,12)+'...';
  document.getElementById('worm').textContent='WORM CHAIN: '+wormPrev;
}
sealEvent('WORLD_GEN');

let last=0,frames=0,fps=0;
function loop(ts) {
  frames++;
  if (ts-last>1000) { fps=frames; frames=0; last=ts; document.getElementById('fps').textContent=fps; }
  update();
  render3D();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
window.addEventListener('resize',()=>{
  resizeCanvas();
});
</script>
</body>
</html>
